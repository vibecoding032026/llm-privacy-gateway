services:

  # ── Gateway (FastAPI server) ───────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-privacy-gateway:1.5.0
    container_name: llm-gateway
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/data/users.db
      - LOG_DIR=/data/logs
      - CHROMA_PATH=/data/chroma_db
    volumes:
      - gateway_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 15s
      timeout: 5s
      start_period: 25s
      retries: 5

  # ── Streamlit Web UI ───────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: llm-privacy-ui:1.5.0
    container_name: llm-ui
    ports:
      - "8501:8501"
    environment:
      - GATEWAY_URL=http://gateway:8000
      - GATEWAY_BASE=http://gateway:8000
      - MODEL=gpt-4o-mini
    depends_on:
      gateway:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3

volumes:
  gateway_data:
    driver: local
